# Render.com blueprint for the Marina Operations app.
# Rails 8 monolith using Solid Queue (DB-backed jobs) and Solid Cable (DB-backed websockets).
# No Redis required.
#
# First deploy: connect this repo as a Blueprint, then set the secret env vars
# marked `sync: false` in the Render dashboard (RAILS_MASTER_KEY is required;
# RESEND_API_KEY / TWILIO_* are required if you want real email / SMS delivery).
#
# The seeded admin (northshoremarinaapp@gmail.com) gets a password from
# SEED_MANAGER_PASSWORD, which Render auto-generates the first time (see below).
# The seed script also prints the password to the build logs on first deploy —
# capture it from the "Logs" tab on Render and save it in a password manager.

databases:
  - name: marina-db
    # Render renamed Postgres plans in 2024 — legacy "starter" is no longer
    # accepted on new databases. Replacement tiers: free (90-day expiry),
    # basic_256mb ($6/mo, 256MB RAM, 1GB storage — equivalent to old starter),
    # basic_1gb ($19/mo), pro_4gb ($95/mo), etc.
    plan: basic_256mb
    postgresMajorVersion: 16

services:
  - type: web
    name: marina-web
    runtime: ruby
    plan: starter
    autoDeploy: true
    buildCommand: ./bin/render-build
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      # ---- Core Rails ----
      - key: DATABASE_URL
        fromDatabase:
          name: marina-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: RAILS_MAX_THREADS
        value: "5"
      - key: SECRET_KEY_BASE
        generateValue: true
      # Required: decrypts config/credentials.yml.enc. Set in dashboard.
      - key: RAILS_MASTER_KEY
        sync: false

      # ---- Seeded admin ----
      # Hardcoded so the seed script knows which user gets the password.
      - key: SEED_MANAGER_EMAIL
        value: northshoremarinaapp@gmail.com
      - key: SEED_MANAGER_NAME
        value: North Shore Marina Admin
      # Render generates this once at blueprint apply, then it stays stable
      # across deploys. The seed adopts it as the admin's password. To rotate,
      # change the value in the dashboard and redeploy (idempotent).
      - key: SEED_MANAGER_PASSWORD
        generateValue: true

      # ---- Email (Resend) ----
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false

      # ---- SMS (Twilio) ----
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false

  - type: worker
    name: marina-worker
    runtime: ruby
    plan: starter
    autoDeploy: true
    buildCommand: bundle install
    startCommand: bundle exec bin/jobs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marina-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      # The worker doesn't issue cookies but boot still needs these set.
      - key: SECRET_KEY_BASE
        fromService:
          type: web
          name: marina-web
          envVarKey: SECRET_KEY_BASE
      - key: RAILS_MASTER_KEY
        sync: false

      # Outbound notification creds (worker needs these to send)
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
