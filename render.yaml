# Render.com blueprint for the Marina Operations app.
# Rails 8 monolith. One web service hosts everything — Puma serves HTTP, and
# Solid Queue runs in-process via the Puma plugin (gated by SOLID_QUEUE_IN_PUMA).
# Solid Cache + Solid Cable also share the primary Postgres database. No
# separate worker service, no Redis.
#
# First deploy: connect this repo as a Blueprint, then set the secret env vars
# marked `sync: false` in the Render dashboard (RAILS_MASTER_KEY is required;
# RESEND_API_KEY / TWILIO_* are required if you want real email / SMS delivery).
#
# The seeded admin (northshoremarinaapp@gmail.com) gets a password from
# SEED_MANAGER_PASSWORD, which Render auto-generates the first time (see below).
# The seed script also prints the password to the build logs on first deploy —
# capture it from the "Logs" tab on Render and save it in a password manager.

databases:
  - name: marina-db
    # Render's current Postgres plans (hyphens, not underscores):
    #   free         — $0,    256MB RAM, 1GB storage, expires after 90 days
    #   basic-256mb  — $6/mo, 256MB RAM, 1GB storage
    #   basic-1gb    — $19/mo, 1GB RAM,  10GB storage
    #   basic-4gb    — $45/mo, 4GB RAM,  40GB storage
    #   pro-4gb      — $95/mo, 4GB RAM,  100GB storage  (HA, more connections)
    # See https://render.com/docs/yaml-spec#databases for the full list.
    plan: basic-256mb
    postgresMajorVersion: 16

services:
  - type: web
    name: marina-web
    runtime: ruby
    plan: starter
    autoDeploy: true
    buildCommand: ./bin/render-build
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      # ---- Core Rails ----
      - key: DATABASE_URL
        fromDatabase:
          name: marina-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: RAILS_MAX_THREADS
        value: "5"
      # Used for mailer URLs and Host header allowlist. Set this to your custom
      # domain (e.g. "marina.example.com") if not using the onrender.com URL.
      - key: APP_HOST
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      # Required: decrypts config/credentials.yml.enc. Set in dashboard.
      - key: RAILS_MASTER_KEY
        sync: false

      # ---- Run Solid Queue inside Puma (no separate worker service) ----
      # config/puma.rb has `plugin :solid_queue if ENV["SOLID_QUEUE_IN_PUMA"]`.
      # Flip to "" to disable if you ever split out a dedicated worker.
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"
      - key: JOB_CONCURRENCY
        value: "1"

      # ---- Seeded admin ----
      # Hardcoded so the seed script knows which user gets the password.
      - key: SEED_MANAGER_EMAIL
        value: northshoremarinaapp@gmail.com
      - key: SEED_MANAGER_NAME
        value: North Shore Marina Admin
      # Render generates this once at blueprint apply, then it stays stable
      # across deploys. The seed adopts it as the admin's password. To rotate,
      # change the value in the dashboard and redeploy (idempotent).
      - key: SEED_MANAGER_PASSWORD
        generateValue: true

      # ---- Email (Resend) ----
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false

      # ---- SMS (Quo) ----
      # QUO_API_KEY: paste the value from quo.com -> Settings -> API keys
      # QUO_FROM: either an E.164 number (e.g. "+15555555555") that you own
      # in Quo, or a Quo phone number id ("PN..."). Either form works.
      - key: QUO_API_KEY
        sync: false
      - key: QUO_FROM
        sync: false

      # ---- Push notifications (Pushover) ----
      # App API token from pushover.net -> Your Applications. Each Location's
      # pushover_group_key is seeded; staff user keys are managed in the admin
      # Staff form. Set this in the Render dashboard (same key on staging + prod).
      - key: PUSHOVER_APP_API_KEY
        sync: false
